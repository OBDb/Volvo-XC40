generations:
  - name: "First Generation (Pre-Facelift)"
    start_year: 2017
    end_year: 2022
    description: "The Volvo XC40 is Volvo's first compact luxury crossover SUV, unveiled on September 21, 2017 as the smallest member of Volvo's SUV lineup below the XC60. Built on the Compact Modular Architecture (CMA) platform developed with parent company Geely, it features distinctive styling that maintains Volvo's design language while incorporating youthful, urban elements like an available contrasting roof, bold character lines, and the signature Thor's Hammer LED headlights. The interior offers a modern, minimalist approach with high-quality materials, clever storage solutions throughout the cabin, and a 9-inch Sensus touchscreen infotainment system. Initially launched with a range of engines including 1.5-liter three-cylinder and 2.0-liter four-cylinder engines in both diesel (D3/D4) and petrol variants (T3, T4, T5). In the US market, engine choices were limited to the 2.0-liter four-cylinder petrol-powered T4 and T5 models. The plug-in hybrid T5 Twin Engine was introduced in 2019, combining a 180 hp petrol engine with a 74 kW electric motor. The XC40 Recharge pure electric model was added in late 2020, marking Volvo's first all-electric production vehicle with a 78 kWh battery pack. Safety features are comprehensive, including City Safety collision avoidance, Pilot Assist semi-autonomous driving capability, and numerous advanced driver assistance systems. The XC40 won European Car of the Year 2018 and Car of the Year Japan for 2018/2019."
  - name: "First Generation (Facelift)"
    start_year: 2023
    end_year: null
    description: "The XC40 received a significant facelift for the 2023 model year. The refreshed model features aesthetic changes that bring it more into line with the C40 Recharge, including updated headlights, bumpers, and integration of Android Automotive for the mild hybrid models. Diesel-powered models were dropped from the lineup entirely. In 2023, Volvo made mild hybrids the base engine option in the US market, removing conventional engines as an option. The single-motor electric version was revised to adopt a rear-wheel drive layout instead of front-wheel drive, making it the first rear-wheel-drive Volvo vehicle in 25 years. The electric version received improved range and efficiency with a new motor. In 2024, Volvo renamed the battery electric XC40 to the Volvo EX40, aligning it with newer battery electric models such as the EX30 and EX90. The facelift also introduced a new ADAS sensor platform for enhanced safety features."
